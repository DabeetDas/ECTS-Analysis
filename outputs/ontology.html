      background: #ffffff;
      border: 1px solid #d8ded8;
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(31, 41, 51, 0.08);
    }
    .edge {
      fill: none;
      stroke: #8a979f;
      stroke-width: 1.4;
      opacity: 0.72;
    }
    .node rect {
      fill: #ffffff;
      stroke: #2f6f5e;
      stroke-width: 1.4;
      rx: 8;
    }
    .node.multi-parent rect {
      stroke: #b6543c;
      stroke-width: 2;
    }
    .node.root rect {
      fill: #edf7f2;
    }
    .node:hover rect {
      fill: #fff8e8;
      stroke-width: 2.4;
    }
    .node:hover text {
      fill: #0f1d25;
    }
    .hover-panel {
      display: none;
      pointer-events: none;
    }
    .node:hover .hover-panel {
      display: block;
    }
    .hover-panel-box {
      background: #fffdf7;
      border: 1px solid #c6d1ca;
      border-radius: 8px;
      box-shadow: 0 14px 36px rgba(31, 41, 51, 0.18);
      color: #1f2933;
      font-size: 12px;
      line-height: 1.35;
      max-height: 260px;
      overflow: hidden;
      padding: 12px;
    }
    .hover-panel-title {
      color: #132027;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .hover-panel-label {
      color: #53616a;
      font-weight: 700;
      margin-top: 7px;
    }
    .hover-panel-text {
      color: #27343c;
      margin-top: 3px;
    }
    .node-title {
      fill: #18242c;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .node-detail {
      fill: #66747d;
      font-size: 11px;
      letter-spacing: 0;
    }
